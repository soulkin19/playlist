<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114514電卓 7095110版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', sans-serif;
        }
        
        .calculator {
            background: #222;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.6),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 6px solid #0f0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .header h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 4px;
        }
        
        .version {
            font-size: 12px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }
        
        #display {
            width: 100%;
            height: 90px;
            background: #111;
            color: #0f0;
            font-size: 32px;
            text-align: right;
            padding: 0 15px;
            border: 4px solid #0f0;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.5);
            font-family: 'Press Start 2P', sans-serif;
            overflow: hidden;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            height: 70px;
            font-size: 22px;
            font-family: 'Press Start 2P', sans-serif;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #000;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000;
        }
        
        .num {
            background: #333;
            color: #0ff;
        }
        
        .num:active {
            background: #555;
        }
        
        .operator {
            background: #0f0;
            color: #111;
            font-weight: bold;
        }
        
        .operator:active {
            background: #0c0;
        }
        
        .clear {
            background: #f00;
            color: #fff;
            grid-column: span 2;
        }
        
        .equal {
            background: #00f;
            color: #fff;
            grid-column: span 2;
        }
        
        .special {
            background: #ff0;
            color: #111;
        }
        
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #0f0;
            font-size: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>114514電卓</h1>
            <div class="version">7095110版</div>
        </div>
        
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendToDisplay('(')">(</button>
            <button onclick="appendToDisplay(')')">)</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">−</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">＋</button>
            
            <button class="num" onclick="appendToDisplay('0')">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            <button class="special" onclick="special114514()">114514</button>
            <button class="equal" onclick="calculate()">=</button>
            
            <button class="special" onclick="special7095110()" style="grid-column: span 2;">7095110</button>
            <button class="special" onclick="iiyo()" style="grid-column: span 2;">いいよ</button>
        </div>
        
        <div class="footer">
            7095110 EDITION
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        
        function appendToDisplay(value) {
            if (display.value === '0' && value !== '.') {
                display.value = value;
            } else {
                display.value += value;
            }
        }
        
        function clearDisplay() {
            display.value = '';
        }
        
        function calculate() {
            try {
                // 安全な計算処理
                let result = eval(display.value.replace('×', '*').replace('÷', '/'));
                display.value = result;
            } catch (e) {
                display.value = 'ERROR';
                setTimeout(() => { display.value = ''; }, 1000);
            }
        }
        
        // 114514ボタン
        function special114514() {
            display.value = '114514';
        }
        
        // 7095110ボタン
        function special7095110() {
            display.value = '7095110';
        }
        
        // いいよボタン（114514のネタ）
        function iiyo() {
            display.value = 'いいよいいよ';
            setTimeout(() => {
                display.value = '114514';
            }, 800);
        }
        
        // Enterキーで計算
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
        
        console.log('%c114514電卓 7095110版 起動完了', 'color:#0f0; font-family:monospace;');
    </script>
</body>
</html>
