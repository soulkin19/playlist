<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耐久動画メーカー（保存専用）</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        h2 { margin-top: 0; color: #ff5252; text-align: center; }
        .desc { font-size: 0.9em; color: #aaa; margin-bottom: 25px; line-height: 1.5; }
        .form-group {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #fff; }
        input[type="file"] { display: block; width: 100%; margin-bottom: 10px; color: #ccc; }
        small { display: block; font-size: 0.8em; color: #888; }
        
        .radio-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .radio-group input[type="number"] {
            width: 70px; padding: 5px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff;
        }
        .radio-group input[type="number"]:disabled { opacity: 0.5; cursor: not-allowed; }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #ff5252;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #ff1744; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            color: #64ffda;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>耐久動画ジェネレーター</h2>
    <p class="desc">
        動画をウェブ上で再生せず、指定回数/時間ループさせた「耐久動画ファイル」として直接パソコン・スマホに保存する専用ツールです。<br>
        ※画質を落とさず高速につなぎ合わせます。<br>
        ※元動画は <b>.mp4形式</b> を推奨します。生成される動画サイズが大きいとブラウザのメモリ不足になるためご注意ください。
    </p>
    
    <div class="form-group">
        <label>🎥 元の動画ファイル (必須)</label>
        <input type="file" id="videoFile" accept="video/mp4,video/webm,video/mov">
    </div>

    <div class="form-group">
        <label>🖼 サムネイル画像 (任意)</label>
        <input type="file" id="thumbFile" accept="image/jpeg,image/png">
        <small>設定すると動画ファイルの「カバー画像」として書き換えられます。</small>
    </div>

    <div class="form-group">
        <label>🔁 耐久設定</label>
        <div class="radio-group">
            <input type="radio" name="mode" id="radioCount" value="count" checked>
            <label for="radioCount">回数指定:</label>
            <input type="number" id="countInput" value="10" min="1" max="500"> 回ループ
        </div>
        <div class="radio-group">
            <input type="radio" name="mode" id="radioTime" value="time">
            <label for="radioTime">時間指定:</label>
            <input type="number" id="timeH" value="1" min="0"> 時間
            <input type="number" id="timeM" value="0" min="0" max="59"> 分
            <input type="number" id="timeS" value="0" min="0" max="59"> 秒
        </div>
    </div>

    <button id="makeBtn">動画を生成して保存</button>
    <div id="status">待機中...</div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
<script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<script>
    const radioCount = document.getElementById('radioCount');
    const radioTime = document.getElementById('radioTime');
    const countInput = document.getElementById('countInput');
    const timeH = document.getElementById('timeH');
    const timeM = document.getElementById('timeM');
    const timeS = document.getElementById('timeS');
    const makeBtn = document.getElementById('makeBtn');
    const statusDiv = document.getElementById('status');
    const videoInput = document.getElementById('videoFile');
    const thumbInput = document.getElementById('thumbFile');

    // モード切替時の入力欄制御
    function updateInputs() {
        countInput.disabled = !radioCount.checked;
        timeH.disabled = timeM.disabled = timeS.disabled = !radioTime.checked;
    }
    radioCount.addEventListener('change', updateInputs);
    radioTime.addEventListener('change', updateInputs);
    updateInputs();

    // 動画の長さを取得する関数
    function getVideoDuration(file) {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            const url = URL.createObjectURL(file);
            video.preload = 'metadata';
            video.onloadedmetadata = function() {
                URL.revokeObjectURL(url);
                resolve(video.duration);
            };
            video.onerror = function() {
                URL.revokeObjectURL(url);
                reject(new Error("動画の長さを取得できませんでした。"));
            };
            video.src = url;
        });
    }

    // 処理本体
    const { FFmpeg } = window.FFmpeg;
    const { fetchFile } = window.FFmpegUtil;
    let ffmpeg = null;

    makeBtn.addEventListener('click', async () => {
        if (!videoInput.files.length) {
            alert("元の動画ファイルを選択してください。");
            return;
        }

        const videoFile = videoInput.files[0];
        const thumbFile = thumbInput.files.length > 0 ? thumbInput.files[0] : null;

        makeBtn.disabled = true;
        
        try {
            statusDiv.innerText = "変換エンジンを準備中...";
            if (!ffmpeg) {
                ffmpeg = new FFmpeg();
                ffmpeg.on('log', ({ message }) => {
                    console.log(message);
                    if (message.includes('time=')) {
                        statusDiv.innerText = "耐久動画を生成中... " + message;
                    }
                });
                await ffmpeg.load({
                    coreURL: "https://unpkg.com/@ffmpeg/core@0.12.4/dist/umd/ffmpeg-core.js",
                    wasmURL: "https://unpkg.com/@ffmpeg/core@0.12.4/dist/umd/ffmpeg-core.wasm",
                });
            }

            statusDiv.innerText = "ファイルを読み込み中...";
            const vidExt = videoFile.name.split('.').pop();
            const inVid = 'input.' + vidExt;
            await ffmpeg.writeFile(inVid, await fetchFile(videoFile));
            
            let inThumb = null;
            if (thumbFile) {
                const thExt = thumbFile.name.split('.').pop();
                inThumb = 'thumb.' + thExt;
                await ffmpeg.writeFile(inThumb, await fetchFile(thumbFile));
            }

            let loops = 1;
            let targetSec = 0;

            if (radioCount.checked) {
                loops = parseInt(countInput.value) || 1;
            } else {
                statusDiv.innerText = "動画の長さを解析中...";
                const duration = await getVideoDuration(videoFile);
                const h = parseInt(timeH.value) || 0;
                const m = parseInt(timeM.value) || 0;
                const s = parseInt(timeS.value) || 0;
                targetSec = (h * 3600) + (m * 60) + s;
                
                if (targetSec <= 0) throw new Error("時間が正しく設定されていません");
                loops = Math.ceil(targetSec / duration); // 指定時間に必要なループ回数を計算
            }

            statusDiv.innerText = "構成リストを作成中...";
