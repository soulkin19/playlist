<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耐久動画プレイヤー (修正版)</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #2a2a2a; padding: 20px; border-radius: 12px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 6px; border: none; background: #333; color: #fff; }
        button { padding: 10px 20px; border: none; border-radius: 6px; background: #ff0000; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #cc0000; }
        .player-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        #ytPlayer { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: none; }
        .playlist { list-style: none; padding: 0; margin-top: 20px; }
        .playlist li { background: #333; margin-bottom: 5px; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; cursor: pointer; }
        .playlist li:hover { background: #444; }
        .active { border-left: 4px solid #ff0000; background: #444 !important; }
        .loop-box { margin: 15px 0; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>耐久動画プレイヤー</h2>
    
    <div class="controls">
        <input type="text" id="ytInput" placeholder="YouTube URL (youtu.be形式もOK)">
        <button onclick="addYouTube()">追加</button>
    </div>

    <div class="loop-box">
        <input type="checkbox" id="loopCheck" checked>
        <label for="loopCheck">🔥 1曲ループ（耐久モード）</label>
    </div>

    <div class="player-wrapper">
        <div id="ytPlayer"></div>
        <video id="localPlayer" controls></video>
    </div>

    <ul class="playlist" id="playlistUI"></ul>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let ytPlayer;
    let playlist = [];
    let currentIndex = -1;
    let apiReady = false;

    // YouTube APIが準備できたら呼ばれる
    function onYouTubeIframeAPIReady() {
        apiReady = true;
        // 最初のプレイヤーを空で作成（後でloadするために必要）
        ytPlayer = new YT.Player('ytPlayer', {
            height: '100%',
            width: '100%',
            videoId: '', 
            events: {
                'onStateChange': onPlayerStateChange,
                'onError': (e) => console.error("YT Error:", e)
            }
        });
    }

    // URLから動画IDを抜く（より強力な正規表現）
    function extractYTId(url) {
        const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[7].length == 11) ? match[7] : null;
    }

    function addYouTube() {
        const val = document.getElementById('ytInput').value;
        const id = extractYTId(val);
        
        if (id) {
            playlist.push({ type: 'yt', id: id, title: "YouTube動画: " + id });
            renderPlaylist();
            document.getElementById('ytInput').value = '';
            // 初めての追加なら再生
            if (currentIndex === -1) playVideo(0);
        } else {
            alert("URLを読み取れませんでした。もう一度確認してください。");
        }
    }

    function renderPlaylist() {
        const ui = document.getElementById('playlistUI');
        ui.innerHTML = '';
        playlist.forEach((item, index) => {
            const li = document.createElement('li');
            if (index === currentIndex) li.className = 'active';
            li.innerHTML = `<span>${item.title}</span>`;
            li.onclick = () => playVideo(index);
            ui.appendChild(li);
        });
    }

    function playVideo(index) {
        if (!apiReady) return alert("YouTube APIを読み込み中です。少々お待ちください。");
        currentIndex = index;
        renderPlaylist();
        
        const item = playlist[index];
        document.getElementById('localPlayer').style.display = 'none';
        document.getElementById('ytPlayer').style.display = 'block';
        
        // 動画をロードして再生
        ytPlayer.loadVideoById(item.id);
    }

    function onPlayerStateChange(event) {
        // 再生終了(0)したとき
        if (event.data === YT.PlayerState.ENDED) {
            const isLoop = document.getElementById('loopCheck').checked;
            if (isLoop) {
                ytPlayer.playVideo(); // ループ再生
            } else {
                playNext(); // 次の曲へ
            }
        }
    }

    function playNext() {
        let next = currentIndex + 1;
        if (next >= playlist.length) next = 0;
        playVideo(next);
    }
</script>

</body>
</html>
