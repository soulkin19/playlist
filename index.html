<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7095110ジェネレーター（野獣先輩ver）</title>
    <style>
        body {
            background-color: #f5f5dc; /* 落ち着いた背景色 */
            color: #333;
            font-family: 'Meiryo', sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #810810; /* 810カラー */
        }
        .container {
            background-color: #fff;
            border: 3px solid #114514; /* 114514カラー */
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        p.desc {
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        input[type="number"] {
            padding: 12px;
            font-size: 1.2em;
            width: 70%;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #114514;
            color: white;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #810810;
        }
        #result {
            margin-top: 30px;
            font-size: 1.6em;
            font-weight: bold;
            color: #d32f2f;
            word-wrap: break-word;
            min-height: 2em;
        }
        .loading {
            margin-top: 20px;
            font-size: 0.9em;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>7095110ジェネレーター</h1>
        <p class="desc">
            入力した数字を「7, 0, 9, 5, 1, 1, 0」の順番で作るゾ。<br>
            見とけよ見とけよ〜
        </p>
        
        <input type="number" id="targetNumber" placeholder="好きな数字を入れるゾ">
        <br>
        <button onclick="generate()">生成するゾ</button>
        
        <div id="result">ここに式が出るゾ</div>
        <p class="loading" id="status">計算パターン準備中...</p>
    </div>

    <script>
        const digits = ['7', '0', '9', '5', '1', '1', '0'];
        const operators = ['+', '-', '*', '/', '']; // 空白は数字の結合（例: 7と0で70）
        let expressionMap = new Map();

        // ページ読み込み時に全パターン（5の6乗 = 15,625通り）を事前計算
        window.onload = function() {
            const dfs = (index, currentExpr) => {
                if (index === digits.length - 1) {
                    // JavaScriptのevalで8進数エラーが出るのを防ぐため、演算子直後の0の連続を消去 (例: +09 -> +9)
                    let safeExpr = currentExpr.replace(/\b0+(?=\d)/g, '');
                    
                    try {
                        let result = eval(safeExpr);
                        // 計算結果が整数かつ無限大でない場合のみ保存
                        if (Number.isFinite(result) && Number.isInteger(result)) {
                            if (!expressionMap.has(result)) {
                                expressionMap.set(result, currentExpr);
                            }
                        }
                    } catch(e) {}
                    return;
                }

                for (let op of operators) {
                    dfs(index + 1, currentExpr + op + digits[index + 1]);
                }
            };

            // 計算開始
            dfs(0, digits[0]);
            document.getElementById('status').innerText = '準備完了だゾ！いいよ！こいよ！';
        };

        function generate() {
            const input = document.getElementById('targetNumber').value;
            const resultDiv = document.getElementById('result');

            if (input === '') {
                resultDiv.innerText = 'ファッ！？数字が入力されてないゾ！';
                return;
            }

            const target = parseInt(input, 10);

            if (expressionMap.has(target)) {
                let expr = expressionMap.get(target);
                // 出力時は記号を見やすく変換
                let displayExpr = expr
                    .replace(/\*/g, ' × ')
                    .replace(/\//g, ' ÷ ')
                    .replace(/\+/g, ' ＋ ')
                    .replace(/\-/g, ' － ');
                
                resultDiv.innerHTML = `${target} ＝<br>${displayExpr}`;
            } else {
                resultDiv.innerText = 'ンアッー！(作れなかったゾ…)';
            }
        }
    </script>
</body>
</html>
